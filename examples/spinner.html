<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LookUI — Spinner</title>
  <link rel="stylesheet" href="../dist/look.css" />
  <link rel="stylesheet" href="shared.css" />
</head>
<body>

<header class="demo-header">
  <div class="demo-container">
    <a href="index.html" class="demo-back">&larr; All Components</a>
    <h1 style="font-size: var(--lk-text-2xl);">Spinner</h1>
    <p style="opacity: 0.85;">.lk-spinner — sizes, colors, on-dark</p>
  </div>
</header>

<main class="demo-container" style="padding: var(--lk-space-9) var(--lk-space-4);">

  <section class="demo-section">
    <p class="demo-sub">Sizes</p>
    <div class="demo-row">
      <div class="lk-spinner lk-spinner--xs"></div>
      <div class="lk-spinner lk-spinner--sm"></div>
      <div class="lk-spinner"></div>
      <div class="lk-spinner lk-spinner--lg"></div>
      <div class="lk-spinner lk-spinner--xl"></div>
    </div>

    <p class="demo-sub">Colors</p>
    <div class="demo-row">
      <div class="lk-spinner lk-spinner--positive"></div>
      <div class="lk-spinner lk-spinner--warning"></div>
      <div class="lk-spinner lk-spinner--negative"></div>
      <div class="lk-spinner lk-spinner--accent"></div>
    </div>

    <p class="demo-sub">Dense</p>
    <div class="demo-row">
      <div class="lk-spinner lk-spinner--dense lk-spinner--xs"></div>
      <div class="lk-spinner lk-spinner--dense lk-spinner--sm"></div>
      <div class="lk-spinner lk-spinner--dense"></div>
      <div class="lk-spinner lk-spinner--dense lk-spinner--lg"></div>
    </div>

    <p class="demo-sub">On dark</p>
    <div class="demo-row" style="background:var(--lk-secondary-dark);padding:var(--lk-space-4);border-radius:var(--lk-radius);">
      <div class="lk-spinner lk-spinner--on-dark"></div>
      <div class="lk-spinner lk-spinner--on-dark lk-spinner--lg"></div>
    </div>
  </section>

  <div class="demo-usage">
    <p class="demo-usage__title">HTML</p>
    <pre>&lt;div class="lk-spinner lk-spinner--lg"&gt;&lt;/div&gt;
&lt;div class="lk-spinner lk-spinner--positive"&gt;&lt;/div&gt;
&lt;div class="lk-spinner lk-spinner--on-dark"&gt;&lt;/div&gt;</pre>
  </div>

</main>
</body>
</html>
